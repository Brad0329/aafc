<p class="title" style="margin-top:0;">2차 분류 리스트</p>
<div class="tb_basic">
    <table border="0" cellpadding="0" cellspacing="0">
        <colgroup>
            <col/><col width="12%"/><col width="28%"/>
        </colgroup>
        <tbody>
            <tr>
                <th scope="col">2차분류</th>
                <th scope="col">보기</th>
                <th scope="col">관리</th>
            </tr>
            {% if cats %}
                {% for c in cats %}
                <tr>
                    <td>{{ c.cate_name }}</td>
                    <td>{{ c.cate_is_display }}</td>
                    <td>
                        <img src="/static/ba_office/images/btn_edit.gif" alt="수정" onclick="goEdit({{ c.cate_code }})" style="cursor:pointer;">
                        <img src="/static/ba_office/images/btn_del.gif" alt="삭제" onclick="goDel({{ c.cate_code }}, {{ parent }})" style="cursor:pointer;">
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr><td colspan="3" style="text-align:center;">등록 Data가 없습니다.</td></tr>
            {% endif %}
        </tbody>
    </table>
</div>
<div class="btn_right">
    <a href="/ba_office/lfshop/category/write/?parent={{ parent }}">
        <img src="/static/ba_office/images/btn_regi.gif" alt="등록" style="cursor:pointer;">
    </a>
</div>
